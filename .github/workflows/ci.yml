name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        run: |
          wget -q https://releases.hashicorp.com/terraform/1.6.0/terraform_1.6.0_linux_amd64.zip -O /tmp/terraform.zip
          unzip -o /tmp/terraform.zip terraform
          mv terraform /usr/local/bin/
          terraform version
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform/aws-infra
      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/aws-infra

  kubernetes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML
        run: |
          find kubernetes -name "*.yaml" -o -name "*.yml" 2>/dev/null | while read f; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || echo "INVALID: $f"
          done || echo "done"